version: "2"
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Pre-existing issues — tracked separately for future cleanup
      - linters: [staticcheck]
        text: "QF1008:"
      - linters: [staticcheck]
        text: "ST1011:"
      - linters: [staticcheck]
        text: "QF1006:"
      # aws-sdk-go v1 is deprecated but migration to v2 is tracked separately
      - linters: [staticcheck]
        text: 'SA1019: "github.com/aws/aws-sdk-go/'
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
